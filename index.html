<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Můj veřejný Google Kalendář">
  <title>Můj kalendář</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <div class="header-content">
      <div>
        <p class="eyebrow">Přehled událostí</p>
        <h1>Můj kalendář</h1>
      </div>

      <a
        class="calendar-link"
        href="https://calendar.google.com/calendar/u/0/r"
        target="_blank"
        rel="noopener noreferrer"
      >
        Otevřít Google Kalendář
      </a>
    </div>
  </header>

  <main class="page-content">
    <section class="calendar-card" aria-label="Google Kalendář">
      <iframe
        src="https://calendar.google.com/calendar/embed?src=502a245f6ff913c8f269953e4cbb393ca859c19eb18bbb16d8843b3be52fd556%40group.calendar.google.com&ctz=Europe%2FPrague"
        title="Můj Google Kalendář"
        frameborder="0"
        scrolling="no"
        loading="lazy"
      ></iframe>
    </section>
  </main>

  <footer class="site-footer">
    <p>Časové pásmo: Evropa / Praha</p>
  </footer>
</body>
</html>
