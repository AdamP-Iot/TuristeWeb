<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Můj kalendář</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #18181b, #27272a);
            color: white;
        }

        .container {
            width: 90%;
            max-width: 650px;
            padding: 50px 30px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin-top: 0;
            font-size: 42px;
        }

        p {
            color: #d4d4d8;
            font-size: 18px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 28px;
            border-radius: 10px;
            background-color: #ad1457;
            color: white;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: 0.2s;
        }

        .button:hover {
            background-color: #c2185b;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <main class="container">
        <h1>Můj Google kalendář</h1>

        <p>
            Zde můžeš zobrazit plánované události,
            přepínat týdny a měsíce a otevřít kalendář.
        </p>

        <a class="button" href="hlavniKod.html">
            Otevřít kalendář
        </a>
    </main>

</body>
</html>
